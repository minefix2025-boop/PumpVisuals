plugins {
    id 'net.minecraftforge.gradle' version '5.1.+'
    id 'java'
}

group = 'com.example'
version = '1.0.0'
archivesBaseName = 'pumpkinvisuals'

sourceCompatibility = '1.8'
targetCompatibility = '1.8'

repositories {
    mavenCentral()
    maven {
        name = 'forge'
        url = 'https://files.minecraftforge.net/maven'
    }
}

dependencies {
    // Forge 1.16.5
    minecraft 'net.minecraftforge:forge:1.16.5-36.2.0'
}

minecraft {
    mappings 'official'
    runs {
        client {
            workingDirectory "$projectDir/src/main/resources"
            args = ["--version", "1.16.5"]
        }
        server {
            workingDirectory "$projectDir/src/main/resources"
        }
    }
}